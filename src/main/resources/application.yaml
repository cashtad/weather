server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  mvc:
    converters:
      preferred-json-mapper: jackson

openweather:
  api-key: ${OPENWEATHER_API_KEY}
  base-url: https://api.openweathermap.org

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
